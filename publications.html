<!-- SCRIPT -->
<script>
async function loadDOI(doi, id) {
  try {
    const res = await fetch(`https://api.crossref.org/works/${doi}`);
    const data = await res.json();
    const p = data.message;

    const authors = p.author ? p.author.map(a => a.family).join(", ") : "Unknown authors";

    document.getElementById(id).innerHTML = `
      <div class="pub">
        <h3>${p.title ? p.title[0] : "No title"}</h3>
        <p><strong>${authors}</strong></p>
        <p>${p.abstract ? p.abstract.replace(/<[^>]*>?/gm, "") : "No abstract available"}</p>
        <a href="https://doi.org/${doi}" target="_blank">View Publication</a>
      </div>
    `;
  } catch (e) {
    document.getElementById(id).innerHTML = "<div class='pub'>Error loading publication</div>";
  }
}

/* Load papers */
loadDOI("10.1038/s41598-025-96973-w", "paper1");
loadDOI("10.1002/hsr2.70726", "paper2");
loadDOI("10.1038/s41598-025-12872-0", "paper3");

</script>
