<!DOCTYPE html>
<html lang="en">

<head>

<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/abubokkorshiddik/AbuBokkorShiddik.abs798/main/abslogo.png">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/abubokkorshiddik/AbuBokkorShiddik.abs798/main/abslogo.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Data and Code Lab | ABS</title>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: #f8fafc;
  color: #1f2937;
}

/* NAVBAR (YOUR STYLE) */
.navbar {
  background: linear-gradient(90deg, #00264d, #004080);
  position: sticky;
  top: 0;
  z-index: 9999;
}

.nav-inner {
  max-width: 1100px;
  margin: auto;
  padding: 10px 14px;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 6px;
}

.nav-inner a,
.dropbtn {
  color: white;
  text-decoration: none;
  font-weight: 700;
  padding: 6px 10px;
  border-radius: 5px;
  font-size: 15px;
}

.nav-inner a:hover,
.dropbtn:hover {
  color: #60a5fa;
  background: rgba(255,255,255,0.12);
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #020617, #0b3a6e);
  color: white;
  text-align: center;
  padding: 35px 20px;
}

/* MAIN CARD */
.main-card {
  max-width: 1200px;
  margin: 30px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.06);
}

/* FLEX LAYOUT SIDE BY SIDE */
.flex-container {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

/* TABLE CONTAINER */
.table-box {
  flex: 1;
  min-width: 350px;
}

/* SCROLLABLE TABLE */
.scroll-box {
  max-height: 400px;
  overflow: auto;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  margin-top: 10px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 600px;
}

th, td {
  border: 1px solid #e5e7eb;
  padding: 8px;
  font-size: 13px;
}

th {
  background: #0b3a6e;
  color: white;
}

/* CODE */
.code-box {
  width: 100%;
  height: 200px;
  margin-top: 15px;
  padding: 10px;
  font-family: monospace;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
}

/* BUTTON */
button {
  background: #1d4ed8;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 5px;
  margin-top: 10px;
  cursor: pointer;
}

button:hover {
  background: #1e40af;
}

/* FOOTER */
footer {
  background: #020617;
  color: #e2e8f0;
  text-align: center;
  padding: 20px;
  margin-top: 30px;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-inner">

    <a href="home.html">Home</a>
    <a href="publications.html">Publications</a>
    <a href="service.html">Services</a>

    <div class="dropdown">
      <button class="dropbtn">Digital Lab ▼</button>
    </div>

  </div>
</nav>

<!-- HEADER -->
<div class="header">
  <h1>Data and Code Lab</h1>
  <p>Compact preview with scrollable tables</p>
</div>

<!-- MAIN CARD -->
<div class="main-card">

  <!-- SIDE BY SIDE TABLES -->
  <div class="flex-container">

    <!-- DATA -->
    <div class="table-box">
      <h3>Dataset (20 rows)</h3>
      <div class="scroll-box">
        <table id="table"></table>
      </div>
    </div>

    <!-- VARIABLES -->
    <div class="table-box">
      <h3>Variables (20 rows)</h3>
      <div class="scroll-box">
        <table id="varTable"></table>
      </div>
    </div>

  </div>

  <!-- CODE -->
  <h3 style="margin-top:20px;">Code Preview</h3>
  <textarea id="codeBox" class="code-box"></textarea>

</div>

<footer>
  © 2026 ABS Research Lab
</footer>

<script>

/* LINKS */
const dataURL = "https://raw.githubusercontent.com/abubokkorshiddik/Research-and-Publication/main/GlobalTB.csv";
const varURL = "https://raw.githubusercontent.com/abubokkorshiddik/Research-and-Publication/main/GlobalTBVariables.csv";
const codeURL = "https://raw.githubusercontent.com/abubokkorshiddik/Research-and-Publication/main/TBXAI.txt";

/* LIMIT */
const LIMIT = 20;

/* LOAD CSV */
function loadCSV(url, tableId) {

  fetch(url)
  .then(r => r.text())
  .then(text => {

    const rows = text.split("\n").map(r => r.split(","));

    let html = "";

    rows.slice(0, LIMIT).forEach((row, i) => {
      html += "<tr>";
      row.forEach(cell => {
        html += i === 0 ? `<th>${cell}</th>` : `<td>${cell}</td>`;
      });
      html += "</tr>";
    });

    document.getElementById(tableId).innerHTML = html;

  });

}

/* LOAD CODE */
function loadCode() {

  fetch(codeURL)
  .then(r => r.text())
  .then(text => {
    document.getElementById("codeBox").value = text.split("\n").slice(0, 15).join("\n");
  });

}

/* AUTO LOAD */
loadCSV(dataURL, "table");
loadCSV(varURL, "varTable");
loadCode();

</script>

</body>
</html>
