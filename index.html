<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Profile</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: #ffffff;
  color: #1f2937;
}

/* HEADER */
.hero {
  background: linear-gradient(135deg, #050f1f, #0a2a4a);
  color: #fff;
  padding: 50px 20px;
}

.hero-inner {
  max-width: 1100px;
  margin: auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.hero-text h1 {
  margin: 0;
  font-size: 36px;
}

.hero-text p {
  color: #cbd5e1;
}

/* PHOTO */
.photo {
  width: 200px;
  height: 200px;
  border-radius: 6px;
  overflow: hidden;
  border: 3px solid #1e3a8a;
}

.photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* METRICS */
.metrics {
  max-width: 1000px;
  margin: 40px auto;
  padding: 0 20px;
}

.metrics-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}

.metric-box {
  background: #f8fafc;
  border: 1px solid #e5e7eb;
  padding: 20px;
  text-align: center;
  transition: 0.3s;
}

.metric-box:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 18px rgba(0,0,0,0.08);
}

.metric-value {
  font-size: 28px;
  font-weight: bold;
  color: #1d4ed8;
}

.metric-label {
  margin-top: 8px;
  color: #475569;
}

/* BUTTON */
.link-btn {
  display: inline-block;
  margin-top: 15px;
  background: #1e40af;
  color: white;
  padding: 10px 16px;
  text-decoration: none;
}

/* RESPONSIVE */
@media (max-width: 800px) {
  .hero-inner {
    flex-direction: column;
    text-align: center;
  }

  .metrics-grid {
    grid-template-columns: 1fr 1fr;
  }
}
</style>

</head>

<body>

<!-- HEADER -->
<header class="hero">
  <div class="hero-inner">

    <div class="hero-text">
      <h1>Md. Abu Bokkor Shiddik</h1>
      <p>Researcher | Statistics | Machine Learning | Public Health</p>

      <a class="link-btn" href="https://scholar.google.com/citations?user=JWeBd3IAAAAJ">
        Google Scholar Profile
      </a>
    </div>

    <div class="photo">
      <img src="https://github.com/abubokkorshiddik/Portfolio-AbuBokkorShiddik/blob/main/ABS.jpeg?raw=true">
    </div>

  </div>
</header>

<!-- METRICS -->
<section class="metrics">
  <h2>Research Metrics</h2>

  <div class="metrics-grid">

    <div class="metric-box">
      <div class="metric-value" id="citations">520</div>
      <div class="metric-label">Citations</div>
    </div>

    <div class="metric-box">
      <div class="metric-value" id="hindex">9</div>
      <div class="metric-label">H-index</div>
    </div>

    <div class="metric-box">
      <div class="metric-value" id="i10">7</div>
      <div class="metric-label">i10-index</div>
    </div>

    <div class="metric-box">
      <div class="metric-value" id="publications">12</div>
      <div class="metric-label">Publications</div>
    </div>

  </div>
</section>

<!-- SIMPLE SCRIPT (STATIC NOW, READY FOR FUTURE API) -->
<script>
/*
You can later replace this with real data from an API or backend.
For now it just animates numbers slightly.
*/

function animateValue(id, start, end, duration) {
  let obj = document.getElementById(id);
  let range = end - start;
  let current = start;
  let increment = range / (duration / 20);

  let timer = setInterval(function () {
    current += increment;
    if (current >= end) {
      obj.innerText = end;
      clearInterval(timer);
    } else {
      obj.innerText = Math.floor(current);
    }
  }, 20);
}

animateValue("citations", 0, 520, 1000);
animateValue("hindex", 0, 9, 1000);
animateValue("i10", 0, 7, 1000);
animateValue("publications", 0, 12, 1000);
</script>

</body>
</html>
